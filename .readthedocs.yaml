# Read the Docs build config —— 抄 QuantumAlgorithm 的 mkdocs + RTD 模式。
#
# 与 qalgo 的差异：
#  - 单独 `docs/requirements.txt`（不混进运行时 deps，QA 已有自己的 pyproject 体系）
#  - mkdocs 配置入口仍是仓库根的 mkdocs.yml
#
# 触发：RTD 自己挂 GitHub webhook 处理 PR / 主分支 build。仓库内不另起 docs CI。

version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3"

python:
  install:
    - requirements: docs/requirements.txt

mkdocs:
  configuration: mkdocs.yml
