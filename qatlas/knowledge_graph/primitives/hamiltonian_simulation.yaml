id: primitive_hamiltonian_simulation
name: Hamiltonian Simulation
node_type: Primitive
description: |
  Hamiltonian simulation is the problem of simulating the time evolution of a 
  quantum system described by a Hamiltonian H. It is a fundamental problem in 
  quantum computing with applications in quantum chemistry, materials science, 
  and quantum field theory.

category: transformation
complexity:
  gate_count: O(t · poly(log N, log(1/ε))) for time t, precision ε
  depth: O(t)
  qubits: O(log N + log(1/ε))
  classical_equivalent: O(2^n)
  
references:
  - arxiv:quant-ph/0508139
  - arxiv:1412.4687
  - Lloyd1996

tags:
  - simulation
  - chemistry
  - physics
  - trotterization
  - qpe-based

definition: |
  Given Hamiltonian H = Σ_j h_j H_j and time t, 
  implement unitary U = e^(-iHt) up to precision ε.

methods:
  - Trotterization / Product formulas
  - Qubitization / Quantum walk
  - Linear combination of unitaries (LCU)
