id: primitive_variational_circuit
name: Variational Quantum Circuit
node_type: Primitive
description: |
  Variational quantum circuits (also called parameterized quantum circuits or 
  ansätze) are quantum circuits with tunable parameters. They form the basis 
  of variational quantum algorithms (VQA) like VQE and QAOA.

category: state_prep
complexity:
  gate_count: Depends on ansatz structure
  depth: O(p) where p is number of layers
  qubits: n (problem-dependent)
  parameters: O(p·n) typically
  
references:
  - arxiv:1304.3061  # VQE
  - arxiv:1411.4028  # QAOA

tags:
  - vqa
  - vqe
  - qaoa
  - optimization
  - machine-learning
  - parameterized

definition: |
  A variational circuit U(θ) = Π_l U_l(θ_l) consists of:
  - Single-qubit rotation layers
  - Entangling gates (typically CNOT/CZ)
  - Classical optimization loop

common_ansatze:
  - UCCSD (Unitary Coupled Cluster)
  - Hardware-efficient ansatz
  - QAOA ansatz
  - Tensor network ansatz
