# Qdrant compose template (typical: WSL2 host on the mesh).
#
# Listen on 0.0.0.0 inside the WSL so the Windows host can portproxy
#   <mesh-ip>:{6333,6334} → <WSL-IP>:{6333,6334}
# to expose Qdrant to the EasyTier mesh. Until WSL2 mirrored networking is
# confirmed, the portproxy hop is required (template:
# rag/deploy/portproxy-qdrant-wsl.ps1).
#
# Auth: both API_KEY (rw) and READ_ONLY_API_KEY come from the env file;
# never inline them here. Read-only key is what qatlasd's query path uses;
# ingester uses the rw key.

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: qatlas-rag-qdrant
    restart: unless-stopped
    ports:
      - "0.0.0.0:6333:6333"   # HTTP
      - "0.0.0.0:6334:6334"   # gRPC (preferred by qdrant-client)
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:?set QDRANT_API_KEY in .env}"
      QDRANT__SERVICE__READ_ONLY_API_KEY: "${QDRANT_RO_KEY:?set QDRANT_RO_KEY in .env}"
      # NOTE: indexing_threshold is *per-collection* in Qdrant; setting it at
      # server level via env var collides with the built-in default and
      # crashes with "duplicate field 'indexing_threshold'". Phase 6 sets it
      # to 0 in the create_collection() call (and bumps to 20000 after
      # full-build completes) — that is the correct surface.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/readyz | grep -q 'all shards are ready' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
