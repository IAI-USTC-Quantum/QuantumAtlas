[project]
name = "quantumatlas"
version = "0.2.2"
description = "AI 驱动的量子算法开发辅助系统"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "QuantumAtlas Team", email = "team@quantumatlas.dev" }]
keywords = ["quantum", "algorithm", "llm", "knowledge-graph", "code-generation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "fastapi>=0.115.0,<0.116",
    "uvicorn>=0.30.0,<0.31",
    "jinja2>=3.1.0,<4",
    "python-multipart>=0.0.9,<0.1",
    "neo4j>=5.15.0,<6",
    "pymupdf>=1.23.0,<2",
    "requests>=2.31.0,<3",
    "pydantic>=2.5.0,<3",
    "pydantic-settings>=2.0.0,<3",
    "numpy>=1.26.0,<3",
    "click>=8.1.0,<9",
    "openai>=1.0.0,<2",
    "anthropic>=0.21.0,<0.22",
    "pyyaml>=6.0.1,<7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "black>=24.0.0",
    "isort>=5.13.0",
    "mypy>=1.7.0",
    "ruff>=0.8.0",
]

[project.scripts]
qatlas = "atlas.cli:main"

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atlas"]

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_scheme = "pep440"
version_provider = "pep621"
update_changelog_on_bump = true
major_version_zero = true

# Pytest
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["-v", "--tb=short", "--strict-markers"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "network: tests that require outbound network access (e.g. arXiv API)",
    "e2e: end-to-end tests that load the repository .env and exercise real external services",
    "legacy: targets only the legacy FastAPI server (atlas/server/), not the current Go server (cmd/server). Excluded by default.",
]

[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
ignore_missing_imports = true

# ============================================================================
# Pixi project (manages the Go toolchain alongside Python)
# ============================================================================
# Why pixi at all? The Go binary needs to be cross-built locally before
# scp'ing to the 1810 server. Pixi pins go's version + brings along the
# matching cc shim so `go vet ./...` doesn't try (and fail) to call a
# missing system gcc. Without this, agents would have to remember to
# `go env -w CGO_ENABLED=0` on every fresh dev machine.
#
# Usage:
#   pixi install        # one-time, creates .pixi/ env
#   pixi shell          # enter env for ad-hoc commands
#   pixi run build      # build the server binary
#   pixi run test-go    # run Go test suite
#   pixi run test-py    # run Python (pytest) suite

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.pixi.dependencies]
# `go` from conda-forge ships a baked-in CC=x86_64-conda-linux-gnu-cc;
# adding `gxx` puts that compiler on PATH so cgo lookups succeed without
# us touching CGO_ENABLED. Pure-Go builds (modernc.org/sqlite-backed
# PocketBase) don't strictly need it, but having it avoids surprise
# cc-not-found errors if someone imports a cgo-using library later.
#
# Pin to 1.26.x — go.mod says `go 1.26.2`. Bump both together when
# upgrading. conda-forge tracks upstream Go releases within a few days.
go = "1.26.*"
gxx = "*"

[tool.pixi.tasks]
build = "go build -o build/quantumatlas ./cmd/server"
test-go = "go test ./internal/... ./cmd/..."
test-py = "uv run pytest -m 'not e2e and not legacy and not network'"
# Scoped to our own code only. `go vet ./...` would walk through the
# entire dep tree (PocketBase pulls 200+ transitive packages) and take
# ~5 minutes on the first run while populating .gocache/build. Anything
# upstream is presumed vet-clean by its maintainers.
vet = "go vet ./internal/... ./cmd/..."
