  /api/wiki/sync/pull:
    post:
      description: |-
        Runs `git fetch --prune` + `git pull --ff-only` on the server
        wiki checkout, then refreshes the in-memory cache. Mutates
        server state, so it requires the wiki:write scope.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: non-fast-forward / wiki dir missing
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Wiki sync pull
      tags:
      - Wiki
  /api/wiki/sync/status:
    get:
      description: |-
        Branch/commit/ahead/behind of the server's wiki checkout.
        Requires the wiki:read scope (the knowledge base is not
        anonymously readable).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Wiki sync status
      tags:
      - Wiki
  /install-qatlasd.sh:
    get:
      description: |-
        Returns a POSIX sh script (text/x-shellscript) that downloads
        the latest qatlasd release binary.
      produces:
      - text/plain
      responses:
        "200":
          description: shell script
          schema:
            type: string
      summary: Installer script
      tags:
      - System
securityDefinitions:
  BearerAuth:
    description: |-
      "Bearer <token>" — two credential shapes
      accepted: a Personal Access Token
      (`Authorization: Bearer qat_...`, minted at
      `/pat` after GitHub OAuth login), or the
      env-loaded system PAT (set
      `QATLAS_SYSTEM_PAT` on the server, send the
      plaintext as `Authorization: Bearer <value>`).
      Browser callers are authenticated through
      pb.authStore (no copy step) — only non-browser
      callers need an explicit bearer.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
