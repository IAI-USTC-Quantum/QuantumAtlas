basePath: /
definitions:
  routes.oauthDeviceCodeRequest:
    properties:
      description:
        type: string
      expires_in_days:
        type: integer
      name:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  routes.oauthDeviceCodeResponse:
    properties:
      device_code:
        type: string
      expires_in:
        type: integer
      interval:
        type: integer
      user_code:
        type: string
      verification_uri:
        type: string
      verification_uri_complete:
        type: string
    type: object
  routes.oauthDeviceLookupResponse:
    properties:
      available_scopes:
        items:
          type: string
        type: array
      description:
        type: string
      expires_in_days:
        type: integer
      max_expiry_days:
        type: integer
      name:
        type: string
      scope_descriptions:
        additionalProperties:
          type: string
        type: object
      scopes:
        items:
          type: string
        type: array
      status:
        type: string
      user_code:
        type: string
    type: object
  routes.oauthDeviceTokenError:
    properties:
      error:
        type: string
    type: object
  routes.oauthDeviceTokenRequest:
    properties:
      device_code:
        type: string
    type: object
  routes.oauthDeviceTokenResponse:
    properties:
      expires_at:
        type: string
      name:
        type: string
      pat_id:
        type: string
      plaintext:
        type: string
      prefix:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  routes.oauthDeviceUserCodeBody:
    properties:
      user_code:
        type: string
    type: object
  routes.patCreateRequest:
    properties:
      description:
        type: string
      expires_in_days:
        description: 'REQUIRED: 1..MaxPATExpiryDays'
        type: integer
      name:
        type: string
      scopes:
        description: 'REQUIRED: may be empty for "no permissions"'
        items:
          type: string
        type: array
    type: object
  routes.patCreateResponse:
    properties:
      created:
        type: string
      description:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      plaintext:
        type: string
      prefix:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  routes.patSummary:
    properties:
      created:
        type: string
      description:
        type: string
      expires_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      prefix:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
info:
  contact:
    name: QuantumAtlas
    url: https://quantum-atlas.ai
  description: |-
    Go + PocketBase backend for QuantumAtlas. Read endpoints
    (wiki/pages/stats/search/graph metadata/health) are public
    because the wiki is an open repo; write endpoints require a
    bearer token (PAT or PocketBase session) plus the matching
    scope. See the auth model docs for the scope vocabulary.
  title: QuantumAtlas API
  version: "1.0"
paths:
  /api/graph/query:
    post:
      consumes:
      - application/json
      description: Executes caller-supplied read-only Cypher. graph:read scope.
      parameters:
      - description: '{query: string, limit: int}'
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Graph query
      tags:
      - Graph
  /api/graph/schema:
    get:
      description: Requires the graph:read scope.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Graph schema
      tags:
      - Graph
  /api/graph/stats:
    get:
      description: |-
        Returns 200 with {"error":...} when Neo4j is unreachable
        (the UI renders a friendly banner rather than a crash page).
        Requires the graph:read scope.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Graph statistics
      tags:
      - Graph
  /api/health:
    get:
      description: |-
        Liveness plus parallel dependency probes (rawstore, neo4j,
        wiki). HTTP status is always 200; read data.status for the
        real verdict ("healthy" | "degraded").
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - System
  /api/oauth/device/approve:
    post:
      consumes:
      - application/json
      description: |-
        Session-only (PAT auth rejected). Marks the pending request
        as approved so the next /token poll mints the PAT bound to
        the approving user.
      parameters:
      - description: user_code from /<lang>/device
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/routes.oauthDeviceUserCodeBody'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"status\":\"approved\"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Approve a device request
      tags:
      - OAuth Device
  /api/oauth/device/code:
    get:
      description: |-
        Session-only (PAT auth rejected). Returns the PAT spec
        (name, description, scopes, expires_in_days) tied to a
        pending user_code so the /<lang>/device page can show the
        user what they're about to approve.
      parameters:
      - description: short user code (with or without dashes)
        in: query
        name: user_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.oauthDeviceLookupResponse'
        "400":
          description: invalid user_code
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Look up pending device request
      tags:
      - OAuth Device
    post:
      consumes:
      - application/json
      description: |-
        RFC 8628 §3.1. Anonymous (no auth) — the CLI uses this to
        obtain a device_code (kept secret, polled on /token) and a
        short user_code that the human enters on the SPA's
        /<lang>/device page after authenticating.
      parameters:
      - description: PAT spec to mint after approval
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/routes.oauthDeviceCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.oauthDeviceCodeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start device authorization
      tags:
      - OAuth Device
  /api/oauth/device/deny:
    post:
      consumes:
      - application/json
      description: |-
        Session-only (PAT auth rejected). Marks the pending request
        as denied so the next /token poll returns "access_denied".
      parameters:
      - description: user_code from /<lang>/device
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/routes.oauthDeviceUserCodeBody'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"status\":\"denied\"}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deny a device request
      tags:
      - OAuth Device
  /api/oauth/device/token:
    post:
      consumes:
      - application/json
      description: |-
        RFC 8628 §3.4 + §3.5. Anonymous. The CLI polls this with
        device_code at the published interval until the server
        returns the minted PAT plaintext (success) or an error
        string ("authorization_pending", "slow_down", "expired_token",
        "access_denied", "invalid_grant"). HTTP status is always
        400 on errors per the RFC so the CLI can switch on `error`.
      parameters:
      - description: device_code from /code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/routes.oauthDeviceTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: minted PAT plaintext (returned exactly once)
          schema:
            $ref: '#/definitions/routes.oauthDeviceTokenResponse'
        "400":
          description: RFC 8628 error string
          schema:
            $ref: '#/definitions/routes.oauthDeviceTokenError'
      summary: Poll for PAT after device approval
      tags:
      - OAuth Device
  /api/pages:
    get:
      description: |-
        Lists wiki entries. Source pages (processed papers) are
        treated as citations and excluded unless page_type=source.
      parameters:
      - description: filter by type (concept|entity|comparison|source)
        in: query
        name: page_type
        type: string
      - description: filter by status
        in: query
        name: status
        type: string
      - description: comma-separated tag filter
        in: query
        name: tags
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List wiki pages
      tags:
      - Wiki
  /api/pages/{page_id}:
    get:
      parameters:
      - description: page id
        in: path
        name: page_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get wiki page
      tags:
      - Wiki
  /api/papers/{arxiv_id}/mineru-claim:
    post:
      parameters:
      - description: arXiv identifier
        in: path
        name: arxiv_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: claim granted (body is the claim record)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid arxiv_id
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not claimable (no PDF in catalog, or markdown already exists)
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: already claimed by someone else (body includes existing claim
            details)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: internal error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: catalog unavailable (Neo4j unreachable)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Claim MinerU processing
      tags:
      - Papers
  /api/papers/{arxiv_id}/mineru-claim/{claim_id}:
    delete:
      parameters:
      - description: arXiv identifier
        in: path
        name: arxiv_id
        required: true
        type: string
      - description: claim id
        in: path
        name: claim_id
        required: true
        type: string
      responses:
        "204":
          description: claim released (empty body)
        "400":
          description: invalid arxiv_id
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: claim_id does not match the active claim
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: catalog unavailable (Neo4j unreachable)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Release MinerU claim
      tags:
      - Papers
  /api/papers/{arxiv_id}/upload-mineru:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Accepts the entire MinerU result zip exactly as returned by `full_zip_url`. Server extracts `full.md` plus every `images/*` entry and stores them to the markdown and images object buckets respectively. Images are written before the markdown so any reader that observes the markdown also observes all referenced images. Replaces the v0.7.x `upload-markdown` endpoint (which only accepted a single .md file and silently dropped images).

        The {arxiv_id} slot also accepts a DOI (`10.<registrant>/<suffix>`) to contribute the converted *published* version. DOI bundles are stored under the `markdown/doi/...` + `images/doi/...` namespace and verified against OpenAlex metadata via the `title`/`authors` form fields (see upload-pdf; `verify=strict` rejects mismatches). The result is reported in `X-QAtlas-Verification`.
      parameters:
      - description: arXiv identifier (with vN) OR DOI (10.x/...)
        in: path
        name: arxiv_id
        required: true
        type: string
      - description: overwrite on content conflict
        in: query
        name: overwrite
        type: boolean
      - description: client-computed zip sha256 (in-transit integrity check)
        in: query
        name: expected_sha256
        type: string
      - description: sha256 of the source PDF that was converted (cross-checked against
          stored PDF)
        in: query
        name: pdf_sha256
        type: string
      - description: 'DOI only: ''strict'' rejects metadata mismatch (default warn)'
        in: query
        name: verify
        type: string
      - description: short label of the contributor's MinerU run (truncated to 64
          chars)
        in: query
        name: source
        type: string
      - description: MinerU result zip (must contain full.md; optional images/*)
        in: formData
        name: mineru_zip
        required: true
        type: file
      - description: 'DOI only: expected paper title to verify against OpenAlex'
        in: formData
        name: title
        type: string
      - description: 'DOI only: expected authors (semicolon-separated) to verify'
        in: formData
        name: authors
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Upload paper MinerU bundle (arXiv id or DOI)
      tags:
      - Papers
  /api/papers/{arxiv_id}/upload-pdf:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Content-addressed upload with sha256 idempotency. 200 when
        bytes are unchanged, 201 when written, 409 on a content
        conflict without overwrite=true.

        The {arxiv_id} slot also accepts a DOI (`10.<registrant>/<suffix>`)
        for contributing a *published* version that may have no arXiv
        preprint. DOI uploads are stored under a disjoint `pdf/doi/...`
        namespace and cross-checked against the DOI's OpenAlex metadata:
        pass `title` and/or `authors` (semicolon-separated) form fields
        to verify. The outcome is reported in `X-QAtlas-Verification` and
        the JSON `verification` block; `verify=strict` rejects a mismatch
        or unknown DOI with 409.
      parameters:
      - description: arXiv identifier (with vN) OR DOI (10.x/...)
        in: path
        name: arxiv_id
        required: true
        type: string
      - description: overwrite on content conflict
        in: query
        name: overwrite
        type: boolean
      - description: client-computed PDF sha256 (in-transit guard)
        in: query
        name: expected_sha256
        type: string
      - description: 'DOI only: ''strict'' rejects metadata mismatch (default warn)'
        in: query
        name: verify
        type: string
      - description: PDF file
        in: formData
        name: pdf
        required: true
        type: file
      - description: 'DOI only: expected paper title to verify against OpenAlex'
        in: formData
        name: title
        type: string
      - description: 'DOI only: expected authors (semicolon-separated) to verify'
        in: formData
        name: authors
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: unchanged
          schema:
            additionalProperties: true
            type: object
        "201":
          description: created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Upload paper PDF (arXiv id or DOI)
      tags:
      - Papers
  /api/papers/{id_or_doi}/markdown:
    get:
      description: |-
        Returns the cached MinerU markdown for the given arxiv id
        (or DOI — the id_or_doi path component is auto-detected
        against the IANA prefix `10.<registrant>/...`). Only
        registered when QATLAS_PAPER_ACCESS_ENABLED=true on the
        server (default off).

        Long-running operation semantics: on cache miss the
        server may transparently fetch the PDF from arxiv.org
        (silent_fetch) and trigger a MinerU conversion. The
        first call returns 202 with `Operation-Location:
        /api/papers/{id}/markdown/status` and `Retry-After: 5`;
        clients poll the status endpoint until state=cached then
        re-GET this resource for the bytes.
      parameters:
      - description: arXiv canonical id with vN suffix, or a DOI (e.g. 10.1103/PhysRevLett.103.150502)
        in: path
        name: id_or_doi
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: markdown bytes (text/markdown)
          schema:
            type: string
        "202":
          description: long-running operation started; poll status_url
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid arxiv_id or DOI
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: DOI not in OpenAlex / not on arxiv; or paper unknown and silent
            fetch unavailable
          schema:
            additionalProperties: true
            type: object
        "502":
          description: prior conversion failed inside the cooldown window, or OpenAlex
            upstream error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: cache-only mode (no MinerU keys), or DOI resolution unavailable
            (QATLAS_OPENALEX_MAILTO unset)
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get paper markdown
      tags:
      - Papers
  /api/papers/{id_or_doi}/markdown/status:
    get:
      description: |-
        Side-effect-free poll surface. Never starts a job and
        never triggers a fetch. Only registered when
        QATLAS_PAPER_ACCESS_ENABLED=true on the server.

        Response shape always carries the agent-decision triple
        `state / pdf_ready / md_ready` plus an optional `phase`
        (fetching_pdf | converting_md | ready | error_fetching |
        error_converting) and `fetch` / `convert` sub-objects
        with bytes_received / mineru_task_id / polled_count so a
        polling client can show precise progress.
      parameters:
      - description: arXiv canonical id or DOI
        in: path
        name: id_or_doi
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: status payload (state ∈ cached|queued|running|none|failed|cooldown|unavailable)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: paper unknown and silent fetch unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get markdown conversion status
      tags:
      - Papers
  /api/papers/{id_or_doi}/pdf:
    get:
      description: |-
        Returns the cached PDF (application/pdf) for the given
        arxiv id or DOI. Only registered when
        QATLAS_PAPER_ACCESS_ENABLED=true on the server.

        Long-running operation semantics mirror /markdown: cache
        miss returns 202 with Operation-Location pointing at
        /pdf/status. The fetch path uses a separate semaphore
        from MinerU conversion (QATLAS_ARXIV_FETCH_CONCURRENT)
        and a polite-pool rate limiter (QATLAS_ARXIV_FETCH_RPS).
      parameters:
      - description: arXiv canonical id with vN suffix, or a DOI
        in: path
        name: id_or_doi
        required: true
        type: string
      produces:
      - application/pdf
      responses:
        "200":
          description: PDF bytes (application/pdf)
          schema:
            type: string
        "202":
          description: silent fetch started; poll status_url
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid arxiv_id or DOI
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: arxiv 404 or DOI not on arxiv
          schema:
            additionalProperties: true
            type: object
        "502":
          description: arxiv upstream error / OpenAlex upstream error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: silent fetch disabled (no fetcher), DOI resolution unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get paper PDF
      tags:
      - Papers
  /api/papers/{id_or_doi}/pdf/status:
    get:
      description: |-
        Side-effect-free poll surface for /pdf. Same shape as
        /markdown/status but states are restricted to the
        fetch-only flow — no convert phase. Only registered when
        QATLAS_PAPER_ACCESS_ENABLED=true.
      parameters:
      - description: arXiv canonical id or DOI
        in: path
        name: id_or_doi
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: status payload (state ∈ cached|queued|running|none|failed|unavailable)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
