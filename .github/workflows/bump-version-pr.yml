name: Open version bump PR

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Semantic version increment"
        required: true
        default: "PATCH"
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR
      manual_version:
        description: "Optional exact version, for example 0.2.2"
        required: false
        type: string
      allow_no_commit:
        description: "Allow a bump even when Commitizen finds no eligible commits"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Install Commitizen
        run: python -m pip install commitizen

      - name: Configure bot git identity
        run: |
          git config user.name "quantumatlas-release-bot"
          git config user.email "quantumatlas-release-bot@users.noreply.github.com"

      - name: Bump version and changelog locally
        id: bump
        env:
          INCREMENT: ${{ inputs.increment }}
          MANUAL_VERSION: ${{ inputs.manual_version }}
          ALLOW_NO_COMMIT: ${{ inputs.allow_no_commit }}
        run: |
          set -euo pipefail

          old_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"

          args=(--yes --changelog --no-verify)
          if [ "$ALLOW_NO_COMMIT" = "true" ]; then
            args+=(--allow-no-commit)
          fi

          if [ -n "$MANUAL_VERSION" ]; then
            cz bump "$MANUAL_VERSION" "${args[@]}"
          else
            cz bump "${args[@]}" --increment "$INCREMENT"
          fi

          new_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="v${new_version}"

          git tag -d "$tag" || true
          git reset --soft HEAD~1
          git reset

          if git diff --quiet -- pyproject.toml CHANGELOG.md; then
            echo "Commitizen did not change pyproject.toml or CHANGELOG.md" >&2
            exit 1
          fi

          unexpected="$(git diff --name-only | grep -Ev '^(pyproject\.toml|CHANGELOG\.md)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "Commitizen changed unexpected files:" >&2
            echo "$unexpected" >&2
            exit 1
          fi

          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run ruff
        run: uv run ruff check atlas tests --select E9,F63,F7,F82

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "bump: version ${{ steps.bump.outputs.old_version }} -> ${{ steps.bump.outputs.new_version }}"
          title: "bump: release ${{ steps.bump.outputs.tag }}"
          body: |
            Automated Commitizen version bump.

            - Previous version: `${{ steps.bump.outputs.old_version }}`
            - New version: `${{ steps.bump.outputs.new_version }}`
            - Release tag after merge: `${{ steps.bump.outputs.tag }}`

            Merge this PR into `main` to let the release workflow create the tag and GitHub Release from the protected branch head.
          branch: release/${{ steps.bump.outputs.tag }}
          delete-branch: true
          add-paths: |
            pyproject.toml
            CHANGELOG.md
