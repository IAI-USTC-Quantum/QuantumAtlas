name: Tag and publish release

# Why this trigger surface:
#   - workflow_dispatch    — manual re-run from the Actions tab.
#   - push paths           — local `cz bump` lands pyproject.toml +
#                            CHANGELOG.md changes on main; this kicks off
#                            tag creation + multi-target publishing.
# We intentionally do NOT use `on: push: tags`. The tag is created BY
# this workflow (so the release == "everything bumped to vX.Y.Z lands on
# main" rather than "someone manually tagged"). Matches qalgo's spirit
# but driven by version-file changes instead of pre-tagging.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
      - CHANGELOG.md

# Top-level permissions are read-only; each job opts in to what it needs.
# Trusted Publishing in pypi-publish requires id-token: write at the JOB
# level (not workflow level), so we keep the workflow default minimal.
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------
  # 1. release-build — produce ALL artifacts in one job, upload once.
  #    Downstream jobs (create-release, pypi-publish) just download.
  #    Splitting into a build vs publish step matches QuantumAlgorithm
  #    (qalgo) and avoids rebuilding on every retry of a failed publish.
  # --------------------------------------------------------------------
  release-build:
    runs-on: ubuntu-latest

    # Surface version + tag to downstream jobs so we don't re-parse
    # pyproject.toml three times.
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.tag.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get release version
        id: version
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Tag validation runs in release-build (not create-release) so a
      # version conflict fails before we waste CPU on Go cross-compile.
      - name: Validate release tag
        id: tag
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          HEAD_SHA="$(git rev-parse HEAD)"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "$TAG already exists at $TAG_SHA, but main is at $HEAD_SHA" >&2
              exit 1
            fi
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Python distributions
        run: |
          python -m pip install build
          python -m build

      # ------------------------------------------------------------------
      # Frontend SPA — must build before the Go binary because web/embed.go
      # uses //go:embed all:dist, which fails the Go build if web/dist/
      # doesn't exist. The Go binary embeds the built SPA directly so
      # there's only one artifact to ship to end users.
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      # ------------------------------------------------------------------
      # Go server binaries — published to the GitHub Release so end users
      # can `curl quantum-atlas.ai/install-server.sh | sh` and get the
      # right artifact for their platform. This is the QuantumAtlas-only
      # step that qalgo doesn't have (pure-Python project).
      #
      # CGO_ENABLED=1 is required since the paperindex package added a
      # cgo binding to libduckdb (marcboeker/go-duckdb). The resulting
      # binary is still self-contained at runtime — libduckdb is
      # statically linked — but cgo cross-compilation needs the target's
      # C toolchain at build time.
      #
      # TODO(paperindex): the ubuntu-latest runner only has the native
      # x86_64 gcc, so cross-compilation to linux/arm64 + darwin/* will
      # currently FAIL. Either (a) split this into a matrix-per-runner
      # job (macos-latest for darwin, separate arm64 runner for linux),
      # or (b) install cross-toolchains here (zig / clang). For now we
      # ship linux/amd64 only — both production edges (RackNerd +
      # Alibaba) are linux/amd64, so this covers prod. Non-prod targets
      # will be re-enabled in a follow-up.
      #
      # pixi pulls the same Go toolchain as go.yml — avoids setup-go
      # version drift between CI workflows.
      # ------------------------------------------------------------------
      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: v0.68.0
          cache: true

      - name: Cross-compile qatlas-server binaries
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          mkdir -p dist/bin
          LDFLAGS="-s -w -X main.Version=${{ steps.version.outputs.version }}"

          build() {
            local goos="$1"
            local goarch="$2"
            local out="dist/bin/qatlas-server-${goos}-${goarch}"
            echo "==> $out"
            GOOS="$goos" GOARCH="$goarch" \
              pixi run -- go build -trimpath -ldflags "$LDFLAGS" \
              -o "$out" ./cmd/qatlas-server
          }

          # cgo: only the runner's native target works without extra
          # cross-toolchain setup. See TODO above.
          build linux  amd64
          # build linux  arm64       # disabled: cgo cross-compile
          # build darwin amd64       # disabled: cgo cross-compile
          # build darwin arm64       # disabled: cgo cross-compile

      - name: Generate checksums.txt
        run: |
          set -euo pipefail
          cd dist/bin
          # install-server.sh expects "<sha256>  <asset>" with exactly
          # the bare asset basename (sha256sum's default when given a
          # relative path).
          sha256sum qatlas-server-* > checksums.txt
          cat checksums.txt

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-python
          # *.whl + *.tar.gz only — fed to PyPI via Trusted Publishing.
          # pypa/gh-action-pypi-publish invokes twine on "<dir>/*", so
          # we keep this artifact strictly Python files to avoid twine
          # choking on the Go binary subdirectory.
          path: |
            dist/*.tar.gz
            dist/*.whl
          retention-days: 7

      - name: Upload Go server binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-binaries
          # Go-only: attached to the GitHub Release alongside wheels,
          # not uploaded to PyPI.
          path: dist/bin/
          retention-days: 7

  # --------------------------------------------------------------------
  # 2. create-release — git tag + GitHub Release. Owns ALL files we
  #    publish to the Release page (Python wheels/sdist + Go binaries).
  # --------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      contents: write   # needed to push tag + create release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists-python
          path: dist/

      - name: Download Go server binaries
        uses: actions/download-artifact@v4
        with:
          name: release-dists-binaries
          path: dist/bin/

      - name: Extract latest changelog
        run: |
          VERSION="${{ needs.release-build.outputs.version }}"

          if [ -f CHANGELOG.md ]; then
            awk -v version="$VERSION" '
            BEGIN { found=0; content="" }
            /^## / {
              if (found) exit
              if ($0 ~ version) {
                found=1
                content = content $0 "\n"
                next
              }
              next
            }
            found && /^## / { exit }
            found { content = content $0 "\n" }
            END { print content }
            ' CHANGELOG.md > /tmp/changelog.txt
          else
            echo "Version $VERSION" > /tmp/changelog.txt
          fi

          if [ ! -s /tmp/changelog.txt ]; then
            echo "Version $VERSION" > /tmp/changelog.txt
          fi

      - name: Create release tag
        if: needs.release-build.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.release-build.outputs.tag }}" \
                  -m "Release ${{ needs.release-build.outputs.tag }}"
          git push origin "${{ needs.release-build.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.release-build.outputs.tag }}
          body_path: /tmp/changelog.txt
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/bin/qatlas-server-*
            dist/bin/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true

  # --------------------------------------------------------------------
  # 3. pypi-publish — Trusted Publishing via OIDC.
  #
  # No API token is stored anywhere; instead the PyPI project must be
  # configured to trust THIS workflow file from THIS repo using THIS
  # environment name. Setup is one-time:
  #
  #   1. Create the project on PyPI (one-time, manual).
  #   2. https://pypi.org/manage/project/quantum-atlas/settings/publishing/
  #      add a "Trusted Publisher" with:
  #        owner=IAI-USTC-Quantum repo=QuantumAtlas
  #        workflow=release.yml environment=pypi
  #   3. Create a GitHub environment named "pypi" in the repo
  #      settings (no secrets / protection rules needed for OIDC).
  #
  # Runs in parallel with create-release: both consume the same
  # release-build artifact, neither depends on the other. PyPI side
  # uses skip-existing so re-runs of the workflow against an already-
  # published version are no-ops, not failures.
  # --------------------------------------------------------------------
  pypi-publish:
    runs-on: ubuntu-latest
    needs: release-build
    environment:
      name: pypi
      url: https://pypi.org/p/quantum-atlas/
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists-python
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Keep on: re-runs of the workflow against an already-
          # published version should be silent no-ops.
          skip-existing: true
          # packages-dir defaults to dist/. We deliberately did NOT
          # download the binaries artifact in this job so the directory
          # contains only *.whl + *.tar.gz, matching what twine wants.
