name: Tag and publish release

# Trigger surface — qalgo style:
#   - workflow_dispatch    — manual re-run from the Actions tab.
#   - push tags v*.*.*    — user creates a tag locally with `cz bump
#                           && git push origin v<X.Y.Z>` (or any tag of
#                           the right shape) and that's the ONLY thing
#                           that fires a release.
#
# We previously triggered on pyproject.toml / CHANGELOG.md path-pushes
# and let this workflow create the tag itself. That trigger surface
# fired on ANY unrelated commit that happened to touch those files
# (e.g. a refactor that drops a dependency from pyproject) — and when
# the version string wasn't bumped, the "validate-tag" step would red
# the run with a confusing "tag exists at different SHA" error. The
# qalgo pattern (only push:tags triggers) makes the operator the
# explicit "I want a release" actor: no tag push → no workflow run →
# no spurious red CI badge. See .github/copilot-instructions.md
# "Release / publish 流水" + "🛑 cz bump 上线前置 checklist" sections.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

# Top-level permissions are read-only; each job opts in to what it needs.
# Trusted Publishing in pypi-publish requires id-token: write at the JOB
# level (not workflow level), so we keep the workflow default minimal.
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------
  # 1. prep — single ubuntu job: parse version from the just-pushed tag,
  #    sanity-check it matches pyproject.toml, and emit it as an output
  #    other jobs depend on.
  # --------------------------------------------------------------------
  prep:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          # The push:tags trigger sets github.ref to refs/tags/v<X.Y.Z>;
          # checkout the tag (not main) so we build the exact code the
          # tag points at, not whatever moved on main since.
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve and validate release version
        id: version
        run: |
          set -euo pipefail
          # Tag was pushed by the operator — github.ref_name is e.g. "v0.4.0".
          TAG="${GITHUB_REF_NAME}"
          # Strip the leading 'v' for the bare version string used in
          # filenames / Python wheel metadata.
          VERSION="${TAG#v}"

          # Cross-check: pyproject.toml's version must match the tag.
          # cz bump always keeps them in lock-step; if they're out of
          # sync the operator forgot a step (cz bump but didn't push
          # the right tag, or pushed a hand-typed tag that doesn't
          # match the committed version).
          PYPROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "tag $TAG (version=$VERSION) does not match pyproject.toml version $PYPROJECT_VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------
  # 2. python-build — wheel + sdist, single ubuntu job (Python builds
  #    are platform-agnostic, only one architecture needed).
  # --------------------------------------------------------------------
  python-build:
    runs-on: ubuntu-latest
    needs: prep

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-python
          # *.whl + *.tar.gz only — fed to PyPI via Trusted Publishing.
          # pypa/gh-action-pypi-publish invokes twine on "<dir>/*", so we
          # keep this artifact strictly Python files (no Go binary subdir).
          path: |
            dist/*.tar.gz
            dist/*.whl
          retention-days: 7

  # --------------------------------------------------------------------
  # 3. binary-build — matrix over (OS, arch). Each runner is native to
  #    its target so we build with CGO_ENABLED=1 against that target's
  #    own libc / libduckdb / sqlite — no cross-toolchain juggling.
  #
  #    Linux targets run INSIDE a manylinux_2_28 container (AlmaLinux 8
  #    / glibc 2.28 / gcc-toolset-12) via the job-level `container:`
  #    key, so every step (checkout, node, go build) executes inside it.
  #
  #    Why manylinux_2_28?
  #      - bare ubuntu-latest (24.04) links against CXXABI_1.3.13+,
  #        which breaks on slightly older glibc-2.28-era distros that
  #        still cap at CXXABI ≤ 1.3.12.
  #      - full `-extldflags=-static` removes the CXXABI dep but
  #        SIGSEGVs at runtime: DuckDB `INSTALL httpfs` calls dlopen(),
  #        broken in a fully-static binary (glibc ld machinery absent).
  #      - manylinux_2_28 + `-static-libstdc++ -static-libgcc` gives
  #        the best of both worlds: libstdc++/libgcc are baked into the
  #        binary (zero CXXABI runtime dep), libc stays dynamic (dlopen
  #        works), and glibc ≥ 2.28 covers every current mainstream
  #        Linux distro (Ubuntu 20.04+, Debian 11+, RHEL/Rocky 8+, etc).
  #
  #    Why _2_28, not the older manylinux2014 (CentOS 7 / glibc 2.17)?
  #    GitHub Actions runs every step's JavaScript action (checkout,
  #    setup-node, setup-go …) via `docker exec <container> node20`.
  #    Node 20 requires glibc ≥ 2.28; CentOS 7 only has 2.17 → crash.
  #    manylinux_2_28 (glibc 2.28) is the minimum that satisfies Node.
  #
  #    darwin-arm64 stays on macos-latest (no container). macOS binaries
  #    link /usr/lib/libc++.dylib, uniformly available.
  #
  #    Free runner availability (public repos):
  #      - ubuntu-latest        linux/amd64 → manylinux_2_28_x86_64
  #      - ubuntu-24.04-arm     linux/arm64 → manylinux_2_28_aarch64
  #      - macos-latest         darwin/arm64 (Apple Silicon, native)
  #
  #    darwin/amd64 deliberately NOT shipped: macos-13 runners sit in
  #    queue 10–40 min on the free tier.
  # --------------------------------------------------------------------
  binary-build:
    needs: prep
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
          - target: darwin-arm64
            runner: macos-latest
            container: ""
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true

      # web/embed.go does //go:embed all:dist — need web/dist/ before
      # the Go compile. Cheap (~30 s), simpler to rebuild per matrix
      # entry than to ferry a prebuilt bundle across jobs.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build qatlasd
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          mkdir -p dist/bin
          OUT="dist/bin/qatlasd-${{ matrix.target }}"

          LDFLAGS="-s -w -X main.Version=${{ needs.prep.outputs.version }}"
          case "${{ matrix.target }}" in
            linux-*)
              # Static-link libstdc++ and libgcc so the binary has zero
              # CXXABI runtime dependency. libc stays dynamic (glibc
              # ≥ 2.28 floor from manylinux_2_28) so dlopen() — needed
              # by DuckDB's `INSTALL httpfs` — keeps working.
              LDFLAGS="$LDFLAGS -extldflags '-static-libstdc++ -static-libgcc'"
              ;;
          esac

          go build -trimpath -buildvcs=false -ldflags "$LDFLAGS" -o "$OUT" ./cmd/qatlasd

          # Audit: surface what the binary links against.
          file "$OUT" || true
          case "${{ matrix.target }}" in
            linux-*)
              ldd "$OUT" 2>&1 | head -10 || true
              # With -static-libstdc++, CXXABI entries should be absent
              # (all resolved statically). Only GLIBC entries remain.
              objdump -T "$OUT" 2>/dev/null | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -V -u | tail -5 || true
              objdump -T "$OUT" 2>/dev/null | grep -oE 'CXXABI_[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -V -u | tail -5 || true
              ;;
          esac

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qatlasd-${{ matrix.target }}
          path: dist/bin/qatlasd-${{ matrix.target }}
          retention-days: 7

  # --------------------------------------------------------------------
  # 4. create-release — aggregate all artifacts into one GitHub Release.
  #    Owns the git tag creation too (when prep said exists=false).
  # --------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    needs: [prep, python-build, binary-build]
    permissions:
      contents: write       # needed to push tag + create release
      id-token: write       # OIDC token → Sigstore for SLSA provenance
      attestations: write   # write to GitHub attestations API

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists-python
          path: dist/

      # Each binary lives in its own per-target artifact. `pattern` +
      # `merge-multiple: true` glues them back into a single dist/bin/
      # directory.
      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          pattern: qatlasd-*
          path: dist/bin/
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          set -euo pipefail
          ls -la dist/
          ls -la dist/bin/

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          # One manifest covering EVERY release asset (binaries + wheel +
          # sdist). Naming follows the hashicorp / k8s / debian convention
          # (uppercase, no extension), which signals "this is a checksum
          # manifest" to humans + tools without needing MIME-sniffing.
          cd dist
          ( cd bin && sha256sum qatlasd-* ) > SHA256SUMS
          # Python artifacts (wheel + sdist) live one level up.
          sha256sum *.whl *.tar.gz >> SHA256SUMS
          cat SHA256SUMS

      # SLSA build provenance — signed attestation binding each artifact
      # digest to (this workflow, this commit, this runner, this point in
      # time). Stored in GitHub's attestations API rather than as a
      # release asset; users verify with:
      #
      #   gh attestation verify ./qatlasd-linux-amd64 \
      #     --repo IAI-USTC-Quantum/QuantumAtlas
      #
      # Powered by Sigstore public-good keyless signing (free for public
      # repos, zero key management). Run BEFORE the release-create step
      # so the attestation predates the release notification — anyone
      # auto-downloading on release-published events sees a verifiable
      # artifact from the first moment.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/bin/qatlasd-*

      - name: Extract latest changelog
        run: |
          VERSION="${{ needs.prep.outputs.version }}"

          if [ -f CHANGELOG.md ]; then
            awk -v version="$VERSION" '
            BEGIN { found=0; content="" }
            /^## / {
              if (found) exit
              if ($0 ~ version) {
                found=1
                content = content $0 "\n"
                next
              }
              next
            }
            found && /^## / { exit }
            found { content = content $0 "\n" }
            END { print content }
            ' CHANGELOG.md > /tmp/changelog.txt
          else
            echo "Version $VERSION" > /tmp/changelog.txt
          fi

          if [ ! -s /tmp/changelog.txt ]; then
            echo "Version $VERSION" > /tmp/changelog.txt
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prep.outputs.tag }}
          body_path: /tmp/changelog.txt
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/bin/qatlasd-*
            dist/SHA256SUMS
          draft: false
          prerelease: false
          generate_release_notes: true

  # --------------------------------------------------------------------
  # 5. pypi-publish — Trusted Publishing via OIDC.
  #
  # No API token stored anywhere; PyPI verifies the GitHub OIDC token
  # against a per-project Trusted Publisher config that must match:
  #
  #   PyPI project name:    quantum-atlas
  #   Owner:                IAI-USTC-Quantum
  #   Repository name:      QuantumAtlas
  #   Workflow filename:    release.yml
  #   Environment name:     pypi
  #
  # One-time setup: configure the publisher at
  #   https://pypi.org/manage/project/quantum-atlas/settings/publishing/
  # and create a GitHub Environment named `pypi` in repo Settings
  # (no secrets / approval reviewers needed — the name itself is the
  # match key for the OIDC token).
  #
  # Runs in parallel with create-release: both consume python-build's
  # artifact and neither depends on the other. `skip-existing: true`
  # makes re-runs against an already-published version a no-op.
  # --------------------------------------------------------------------
  pypi-publish:
    runs-on: ubuntu-latest
    needs: [prep, python-build]
    environment:
      name: pypi
      url: https://pypi.org/p/quantum-atlas/
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists-python
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Silent no-op on re-runs against already-published versions.
          skip-existing: true
          # packages-dir defaults to dist/. We deliberately did NOT
          # download the binaries artifact in this job so the directory
          # contains only *.whl + *.tar.gz, matching what twine wants.
