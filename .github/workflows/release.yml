name: Tag and publish release

# Why this trigger surface:
#   - workflow_dispatch    — manual re-run from the Actions tab.
#   - push paths           — local `cz bump` lands pyproject.toml +
#                            CHANGELOG.md changes on main; this kicks off
#                            tag creation + multi-target publishing.
# We intentionally do NOT use `on: push: tags`. The tag is created BY
# this workflow (so the release == "everything bumped to vX.Y.Z lands on
# main" rather than "someone manually tagged"). Matches qalgo's spirit
# but driven by version-file changes instead of pre-tagging.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
      - CHANGELOG.md

# Top-level permissions are read-only; each job opts in to what it needs.
# Trusted Publishing in pypi-publish requires id-token: write at the JOB
# level (not workflow level), so we keep the workflow default minimal.
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------
  # 1. prep — single ubuntu job that does version + tag validation.
  #    Cheap (~5 s), single source of truth for the rest of the workflow.
  #    Splitting it out keeps the matrix jobs from each running their own
  #    redundant tag-validation step.
  # --------------------------------------------------------------------
  prep:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.tag.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get release version
        id: version
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Pre-flight check: refuse to re-release the same version against a
      # different SHA. If the tag already exists at HEAD's SHA, downstream
      # jobs treat exists=true (Create release tag step gets skipped).
      - name: Validate release tag
        id: tag
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          HEAD_SHA="$(git rev-parse HEAD)"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "$TAG already exists at $TAG_SHA, but main is at $HEAD_SHA" >&2
              exit 1
            fi
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # --------------------------------------------------------------------
  # 2. python-build — wheel + sdist, single ubuntu job (Python builds
  #    are platform-agnostic, only one architecture needed).
  # --------------------------------------------------------------------
  python-build:
    runs-on: ubuntu-latest
    needs: prep

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists-python
          # *.whl + *.tar.gz only — fed to PyPI via Trusted Publishing.
          # pypa/gh-action-pypi-publish invokes twine on "<dir>/*", so we
          # keep this artifact strictly Python files (no Go binary subdir).
          path: |
            dist/*.tar.gz
            dist/*.whl
          retention-days: 7

  # --------------------------------------------------------------------
  # 3. binary-build — matrix over (OS, arch). Each runner is native to
  #    its target so we build with CGO_ENABLED=1 against the runner's
  #    own libc / libduckdb / sqlite — no cross-toolchain juggling.
  #
  #    CGO is required because internal/paperindex imports
  #    marcboeker/go-duckdb which links against libduckdb. The resulting
  #    binary is self-contained at runtime (libduckdb is statically
  #    embedded), but build time needs the target's C toolchain.
  #
  #    Free runner availability (public repos):
  #      - ubuntu-latest        linux/amd64
  #      - ubuntu-24.04-arm     linux/arm64   (GitHub free tier 2025-01+)
  #      - macos-latest         darwin/arm64  (Apple Silicon)
  #
  #    darwin/amd64 (Intel Mac) deliberately NOT shipped: macos-13 (Intel)
  #    runners on GitHub's free tier sit in queue for 10–40 minutes which
  #    blocks the whole release. QuantumAtlas's target users are quantum
  #    researchers running these binaries on cloud VMs / linux servers,
  #    not Intel Macs. Add it back if there's actual demand.
  # --------------------------------------------------------------------
  # --------------------------------------------------------------------
  # 3. binary-build — matrix over (OS, arch). Each runner is native to
  #    its target so we build with CGO_ENABLED=1 against that runner's
  #    own libc / libduckdb / sqlite — no cross-toolchain juggling.
  #
  #    Linux targets run INSIDE a manylinux2014 container (CentOS 7 /
  #    glibc 2.17 / GCC 10) instead of on the bare ubuntu-* host. That
  #    container is the Python wheel ecosystem's "build once, run on
  #    every modern Linux" baseline: binaries linked against glibc 2.17
  #    and libstdc++ CXXABI 1.3.18 work on every Linux from RHEL 7 +
  #    Ubuntu 18.04 onwards because glibc / libstdc++ are forward-
  #    compatible (a binary linked against an old symbol set runs on
  #    newer libcs that include those symbols, never the other way).
  #
  #    Why we need this:
  #      - bare ubuntu-latest (Ubuntu 24.04) → binaries demand
  #        CXXABI_1.3.13/1.3.15 etc. → fail to load on Alibaba Cloud
  #        Linux 3 (RHEL 8 derivative, CXXABI ≤ 1.3.12).
  #      - `-extldflags=-static` "fixes" the ABI issue but breaks
  #        DuckDB's runtime `INSTALL httpfs` because dlopen() against
  #        a fully-static binary SIGSEGVs (glibc dynamic-linker
  #        machinery isn't linked in).
  #      - manylinux2014 base gives us a binary that's dynamic-linked
  #        but only against very old glibc/libstdc++ symbols, so it
  #        runs everywhere AND dlopen works. This is the
  #        wheel/PyPA-standard answer to "cgo binary, every Linux".
  #
  #    darwin-arm64 stays on macos-latest (no container, no special
  #    handling). macOS binaries link /usr/lib/libc++.dylib which is
  #    uniformly available on every macOS version.
  #
  #    Free runner availability (public repos):
  #      - ubuntu-latest        linux/amd64 → wrapped in manylinux2014_x86_64
  #      - ubuntu-24.04-arm     linux/arm64 → wrapped in manylinux2014_aarch64
  #      - macos-latest         darwin/arm64 (Apple Silicon, no container)
  #
  #    darwin/amd64 (Intel Mac) deliberately NOT shipped: macos-13 (Intel)
  #    runners on GitHub's free tier sit in queue for 10–40 minutes which
  #    blocks the whole release. QuantumAtlas's target users are quantum
  #    researchers running these binaries on cloud VMs / linux servers,
  #    not Intel Macs. Add it back if there's actual demand.
  # --------------------------------------------------------------------
  binary-build:
    needs: prep
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux2014_x86_64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux2014_aarch64
          - target: darwin-arm64
            runner: macos-latest
            container: ""
    runs-on: ${{ matrix.runner }}
    # Container is empty string for darwin (runs on bare runner). The
    # GitHub Actions runner supports empty-string container as "no
    # container", same as omitting the field — keeps the matrix entries
    # uniform.
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      # web/embed.go does //go:embed all:dist, so we need web/dist/ to
      # exist before the Go compile. The web build is OS-independent, so
      # any platform's output is equivalent — but it's cheap (~30 s) and
      # simpler to rebuild per matrix entry than to ferry a prebuilt
      # bundle across jobs.
      #
      # In manylinux2014, actions/setup-node@v4 needs Node 20+ which is
      # not packaged for CentOS 7 by default — the action downloads its
      # own static Node binary, which works fine on glibc 2.17. The
      # node binary itself is dynamic but uses very old symbols.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      # pixi pins the Go toolchain version, matching go.yml. Works on
      # every matrix runner because conda-forge ships `go` for all four
      # platforms (linux-64, linux-aarch64, osx-arm64) AND conda-forge's
      # glibc baseline is `cos7` (glibc 2.17), matching manylinux2014.
      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: v0.68.0
          cache: true

      - name: Build qatlas-server
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          mkdir -p dist/bin
          OUT="dist/bin/qatlas-server-${{ matrix.target }}"

          # Dynamic link. The manylinux2014 base image gives us a
          # binary that links against old glibc/libstdc++ symbols, so
          # every modern Linux can run it (forward compatibility). NO
          # -extldflags=-static — that breaks DuckDB's dlopen() call in
          # `INSTALL httpfs` at runtime with SIGSEGV.
          pixi run -- go build -trimpath \
            -ldflags "-s -w -X main.Version=${{ needs.prep.outputs.version }}" \
            -o "$OUT" ./cmd/qatlas-server

          # Surface what the binary links against for build-log audit.
          file "$OUT" || true
          case "${{ matrix.target }}" in
            linux-*)
              ldd "$OUT" 2>&1 | head -10 || true
              # Show what GLIBC/CXXABI symbols we actually demand —
              # the highest version in this output is the runtime
              # floor for any host that can install us.
              objdump -T "$OUT" 2>/dev/null | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -V -u | tail -5 || true
              objdump -T "$OUT" 2>/dev/null | grep -oE 'CXXABI_[0-9]+\.[0-9]+(\.[0-9]+)?' | sort -V -u | tail -5 || true
              ;;
          esac

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qatlas-server-${{ matrix.target }}
          path: dist/bin/qatlas-server-${{ matrix.target }}
          retention-days: 7

  # --------------------------------------------------------------------
  # 4. create-release — aggregate all artifacts into one GitHub Release.
  #    Owns the git tag creation too (when prep said exists=false).
  # --------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    needs: [prep, python-build, binary-build]
    permissions:
      contents: write   # needed to push tag + create release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists-python
          path: dist/

      # Each binary lives in its own per-target artifact. `pattern` +
      # `merge-multiple: true` glues them back into a single dist/bin/
      # directory.
      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          pattern: qatlas-server-*
          path: dist/bin/
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          set -euo pipefail
          ls -la dist/
          ls -la dist/bin/

      - name: Generate checksums.txt
        run: |
          set -euo pipefail
          cd dist/bin
          # install-server.sh expects "<sha256>  <basename>" lines, which
          # is sha256sum's default when given relative paths.
          sha256sum qatlas-server-* > checksums.txt
          cat checksums.txt

      - name: Extract latest changelog
        run: |
          VERSION="${{ needs.prep.outputs.version }}"

          if [ -f CHANGELOG.md ]; then
            awk -v version="$VERSION" '
            BEGIN { found=0; content="" }
            /^## / {
              if (found) exit
              if ($0 ~ version) {
                found=1
                content = content $0 "\n"
                next
              }
              next
            }
            found && /^## / { exit }
            found { content = content $0 "\n" }
            END { print content }
            ' CHANGELOG.md > /tmp/changelog.txt
          else
            echo "Version $VERSION" > /tmp/changelog.txt
          fi

          if [ ! -s /tmp/changelog.txt ]; then
            echo "Version $VERSION" > /tmp/changelog.txt
          fi

      - name: Create release tag
        if: needs.prep.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prep.outputs.tag }}" \
                  -m "Release ${{ needs.prep.outputs.tag }}"
          git push origin "${{ needs.prep.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prep.outputs.tag }}
          body_path: /tmp/changelog.txt
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/bin/qatlas-server-*
            dist/bin/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true

  # --------------------------------------------------------------------
  # 5. pypi-publish — Trusted Publishing via OIDC.
  #
  # No API token stored anywhere; PyPI verifies the GitHub OIDC token
  # against a per-project Trusted Publisher config that must match:
  #
  #   PyPI project name:    quantum-atlas
  #   Owner:                IAI-USTC-Quantum
  #   Repository name:      QuantumAtlas
  #   Workflow filename:    release.yml
  #   Environment name:     pypi
  #
  # One-time setup: configure the publisher at
  #   https://pypi.org/manage/project/quantum-atlas/settings/publishing/
  # and create a GitHub Environment named `pypi` in repo Settings
  # (no secrets / approval reviewers needed — the name itself is the
  # match key for the OIDC token).
  #
  # Runs in parallel with create-release: both consume python-build's
  # artifact and neither depends on the other. `skip-existing: true`
  # makes re-runs against an already-published version a no-op.
  # --------------------------------------------------------------------
  pypi-publish:
    runs-on: ubuntu-latest
    needs: [prep, python-build]
    environment:
      name: pypi
      url: https://pypi.org/p/quantum-atlas/
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists-python
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Silent no-op on re-runs against already-published versions.
          skip-existing: true
          # packages-dir defaults to dist/. We deliberately did NOT
          # download the binaries artifact in this job so the directory
          # contains only *.whl + *.tar.gz, matching what twine wants.
