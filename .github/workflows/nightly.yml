name: Nightly production smoke

# Hits the live qatlasd through both edges every night. Scope is
# deliberately narrow — only things that REAL deployment can verify
# (auth-aware health tier wiring, system PAT end-to-end, SPA + Caddy
# stack). Everything else is covered by Go / pytest unit suites that
# run on every push.
#
#   - https://quantum-atlas.ai            (RackNerd, real LE cert)
#   - https://47.102.36.175 | insecure    (Alibaba, tls internal self-signed)
#
# Both targets reverse-proxy to qatlasd on their own host. Failure
# patterns: qatlasd.service down on an edge, Caddy reload broke the
# public vhost, or the edge .env lost its QATLAS_SYSTEM_PAT after
# config rotation (and we forgot to update the matching CI secret).

on:
  schedule:
    - cron: '0 18 * * *'   # UTC 18:00 = 北京时间次日 02:00
  workflow_dispatch:        # 也允许手动从 Actions 页面触发

jobs:
  smoke:
    name: Hit live production targets (qatlasd)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run production smoke against both edges
        env:
          # Two targets, each carrying its own token-env. The smoke
          # suite resolves the env var per target so RackNerd's
          # system PAT can never accidentally be sent to Alibaba
          # (they are NOT interchangeable — each edge has its own
          # QATLAS_SYSTEM_PAT in its own .env).
          QATLAS_SERVER_TARGETS: ${{ secrets.QATLAS_SERVER_TARGETS || 'https://quantum-atlas.ai|token-env=QATLAS_SYSTEM_PAT_RACKNERD,https://47.102.36.175|insecure|token-env=QATLAS_SYSTEM_PAT_ALIBABA' }}

          # System PAT plaintext, one per edge. Setup recipe per edge:
          #   1. generate: openssl rand -base64 32  (or `python3 -c
          #      'import secrets; print(secrets.token_urlsafe(32))'`)
          #   2. on the edge: echo QATLAS_SYSTEM_PAT=<plaintext> >> .env
          #      sudo systemctl restart qatlasd.service
          #   3. verify: journalctl -u qatlasd | grep 'system PAT enabled'
          #   4. store the plaintext as the matching GitHub secret here.
          #
          # Default scope is `*` (set via QATLAS_SYSTEM_PAT_SCOPES on
          # the edge, optional). The smoke suite only needs wiki:read
          # for /api/stats, but `*` is the easiest setup and the
          # operator who can read .env is already trusted.
          #
          # Rotation: regenerate + edit edge .env + restart qatlasd,
          # then update the GitHub secret here. The two halves can
          # be out of sync for a few minutes — the worst case is one
          # nightly fails with a 401 hint pointing at this comment.
          QATLAS_SYSTEM_PAT_RACKNERD: ${{ secrets.QATLAS_SYSTEM_PAT_RACKNERD }}
          QATLAS_SYSTEM_PAT_ALIBABA: ${{ secrets.QATLAS_SYSTEM_PAT_ALIBABA }}

          # 'legacy' marker excludes the old FastAPI-only ingest/*
          # tests that the Go server intentionally does not implement.
        run: uv run pytest -rs -m "e2e and not legacy"


