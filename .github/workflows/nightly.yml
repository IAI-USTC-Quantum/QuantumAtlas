name: Nightly production smoke

# Hits the live qatlasd through both edges every night. Scope is
# deliberately narrow — only things that REAL deployment can verify
# (auth-aware health tier wiring, system PAT end-to-end, SPA + Caddy
# stack). Everything else is covered by Go / pytest unit suites that
# run on every push.
#
# Targets are NEVER hardcoded in this workflow. The list of edges +
# their per-target system-PAT env vars lives in the
# QATLAS_SERVER_TARGETS secret (so flipping an edge, adding a new
# region, or testing a private staging URL doesn't require touching
# committed code — and prod URLs / topology don't leak to anyone
# who can read this YAML).
#
# Format: comma- or newline-separated entries, each `URL[|FLAG]*`.
# Flags: `insecure` (TLS self-signed), `token-env=NAME` (per-target
# PAT plaintext from the matching env var). See _parse_targets in
# tests/integration/test_production_smoke.py for the grammar.
#
# Example (paste verbatim into the secret value, NOT into this YAML):
#   https://quantum-atlas.ai|token-env=QATLAS_SYSTEM_PAT_RACKNERD
#   https://47.102.36.175|insecure|token-env=QATLAS_SYSTEM_PAT_ALIBABA
#
# Failure to set the secret = the suite collects 0 tests (the fixture
# self-skips) and we fail the job below with a clear hint, NOT a
# silent green that hides the misconfig.

on:
  schedule:
    - cron: '0 18 * * *'   # UTC 18:00 = 北京时间次日 02:00
  workflow_dispatch:        # 也允许手动从 Actions 页面触发

jobs:
  smoke:
    name: Hit live production targets (qatlasd)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Validate required secrets
        # Fail loudly + immediately if the operator forgot to set
        # the secrets. Without this guard, the test suite would
        # self-skip every parametrisation and the job would appear
        # green — exactly the silent-misconfig failure mode the
        # nightly is supposed to catch.
        env:
          QATLAS_SERVER_TARGETS: ${{ secrets.QATLAS_SERVER_TARGETS }}
          QATLAS_SYSTEM_PAT_RACKNERD: ${{ secrets.QATLAS_SYSTEM_PAT_RACKNERD }}
          QATLAS_SYSTEM_PAT_ALIBABA: ${{ secrets.QATLAS_SYSTEM_PAT_ALIBABA }}
        run: |
          set -e
          missing=()
          [ -n "$QATLAS_SERVER_TARGETS" ]      || missing+=(QATLAS_SERVER_TARGETS)
          [ -n "$QATLAS_SYSTEM_PAT_RACKNERD" ] || missing+=(QATLAS_SYSTEM_PAT_RACKNERD)
          [ -n "$QATLAS_SYSTEM_PAT_ALIBABA" ]  || missing+=(QATLAS_SYSTEM_PAT_ALIBABA)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::missing required nightly secret(s): ${missing[*]}"
            echo "Set them at https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "See .github/workflows/nightly.yml header for the format."
            exit 1
          fi
          echo "all 3 required secrets are set"

      - name: Run production smoke against both edges
        env:
          QATLAS_SERVER_TARGETS: ${{ secrets.QATLAS_SERVER_TARGETS }}
          QATLAS_SYSTEM_PAT_RACKNERD: ${{ secrets.QATLAS_SYSTEM_PAT_RACKNERD }}
          QATLAS_SYSTEM_PAT_ALIBABA: ${{ secrets.QATLAS_SYSTEM_PAT_ALIBABA }}
        run: uv run pytest -rs -m "e2e and not legacy"



