<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QuantumAtlas{% endblock %}</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11"></script>

    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

    <style>
        .wiki-content h1 { @apply text-2xl font-bold mb-4 mt-6; }
        .wiki-content h2 { @apply text-xl font-semibold mb-3 mt-5; }
        .wiki-content h3 { @apply text-lg font-medium mb-2 mt-4; }
        .wiki-content p { @apply mb-3 leading-relaxed; }
        .wiki-content ul { @apply list-disc list-inside mb-3; }
        .wiki-content ol { @apply list-decimal list-inside mb-3; }
        .wiki-content code { @apply bg-gray-800 px-1 py-0.5 rounded text-sm; }
        .wiki-content pre { @apply bg-gray-900 p-4 rounded-lg mb-4 overflow-x-auto; }
        .wiki-content pre code { @apply bg-transparent p-0; }
        .wiki-content a { @apply text-blue-400 hover:text-blue-300; }
        .wiki-content table { @apply w-full mb-4 border-collapse; }
        .wiki-content th, .wiki-content td { @apply border border-gray-600 px-3 py-2; }
        .wiki-content th { @apply bg-gray-700; }
        .wiki-content blockquote { @apply border-l-4 border-blue-500 pl-4 italic text-gray-400; }
    </style>

    {% block head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-blue-400">QuantumAtlas</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/wiki" class="text-gray-300 hover:text-white px-3 py-2">Wiki</a>
                    <a href="/graph" class="text-gray-300 hover:text-white px-3 py-2">Graph</a>
                    <a href="/api/docs" class="text-gray-300 hover:text-white px-3 py-2">API</a>
                    <form action="/wiki/search" method="get" class="flex">
                        <input type="text" name="q" placeholder="Search..."
                               class="bg-gray-700 text-white px-3 py-1 rounded-l focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded-r">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 border-t border-gray-700 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-gray-400 text-sm">
            QuantumAtlas v{{ app_version }} - AI-driven Quantum Algorithm Framework
        </div>
    </footer>

    {% block scripts %}
    <script>
        // Configure marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, {language: lang}).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true,
        });

        // Render wiki links [[page-id]] -> <a href="/wiki/page/page-id">page-id</a>
        function renderWikiLinks(text) {
            return text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, function(match, id, display) {
                display = display || id;
                return '<a href="/wiki/page/' + id + '" class="text-blue-400 hover:text-blue-300">' + display + '</a>';
            });
        }
    </script>
    {% endblock %}
</body>
</html>
