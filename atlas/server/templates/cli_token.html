{% extends "base.html" %}

{% block title %}CLI Token - QuantumAtlas{% endblock %}

{% block content %}
<div class="max-w-3xl">
    <h1 class="text-3xl font-bold text-white mb-4">CLI Token</h1>
    <p class="text-gray-300 mb-6">
        Generate a temporary bearer token for scripts that call the QuantumAtlas API.
    </p>

    <div class="bg-gray-800 border border-gray-700 rounded-lg p-5">
        <div class="flex items-center gap-3 mb-4">
            <button id="token-button"
                    class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white px-4 py-2 rounded">
                Generate token
            </button>
            <span id="token-status" class="text-sm text-gray-400"></span>
        </div>

        <div id="token-result" class="hidden">
            <label for="token-output" class="block text-sm font-medium text-gray-300 mb-2">
                Bearer token
            </label>
            <textarea id="token-output" readonly rows="5"
                      class="w-full bg-gray-950 text-green-300 border border-gray-700 rounded p-3 font-mono text-sm"></textarea>

            <label for="curl-output" class="block text-sm font-medium text-gray-300 mt-5 mb-2">
                Example
            </label>
            <pre id="curl-output" class="bg-gray-950 border border-gray-700 rounded p-3 overflow-x-auto text-sm text-gray-200"></pre>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    const button = document.getElementById("token-button");
    const statusText = document.getElementById("token-status");
    const result = document.getElementById("token-result");
    const tokenOutput = document.getElementById("token-output");
    const curlOutput = document.getElementById("curl-output");

    button.addEventListener("click", async () => {
        button.disabled = true;
        statusText.textContent = "Generating...";
        try {
            const response = await fetch("/api/auth/cli-token", { method: "POST" });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail || "Token request failed");
            }
            tokenOutput.value = data.access_token;
            curlOutput.textContent =
                `curl -H 'Authorization: Bearer ${data.access_token}' ${window.location.origin}/api/server/info`;
            result.classList.remove("hidden");
            statusText.textContent = `Expires at ${data.expires_at}`;
        } catch (error) {
            statusText.textContent = error.message;
        } finally {
            button.disabled = false;
        }
    });
</script>
{% endblock %}
