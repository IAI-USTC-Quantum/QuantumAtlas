{% extends "base.html" %}

{% block title %}Edit {{ page.frontmatter.title }} - Wiki{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex items-center gap-4">
        <a href="/wiki/page/{{ page.frontmatter.id }}" class="text-gray-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold">Edit: {{ page.frontmatter.title }}</h1>
    </div>

    <!-- Edit Form -->
    <form action="/wiki/edit/{{ page.frontmatter.id }}" method="post" class="space-y-6">
        <!-- Title -->
        <div>
            <label class="block text-sm font-medium mb-2">Title</label>
            <input type="text" name="title" value="{{ page.frontmatter.title }}"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Tags -->
        <div>
            <label class="block text-sm font-medium mb-2">Tags (comma-separated)</label>
            <input type="text" name="tags" value="{{ page.frontmatter.tags|join(', ') }}"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Content -->
        <div>
            <label class="block text-sm font-medium mb-2">Content (Markdown)</label>
            <div class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
                <!-- Toolbar -->
                <div class="flex items-center gap-2 p-2 border-b border-gray-700 bg-gray-750">
                    <button type="button" onclick="insertMarkdown('**', '**')" class="p-2 hover:bg-gray-600 rounded" title="Bold">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"/>
                        </svg>
                    </button>
                    <button type="button" onclick="insertMarkdown('*', '*')" class="p-2 hover:bg-gray-600 rounded" title="Italic">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 4h4m-2 0v16m-4 0h8"/>
                        </svg>
                    </button>
                    <button type="button" onclick="insertMarkdown('`', '`')" class="p-2 hover:bg-gray-600 rounded" title="Code">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                        </svg>
                    </button>
                    <div class="w-px h-6 bg-gray-600"></div>
                    <button type="button" onclick="insertMarkdown('[[' , ']]')" class="p-2 hover:bg-gray-600 rounded" title="Wiki Link">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                        </svg>
                    </button>
                    <button type="button" onclick="insertMarkdown('\\n- ', '')" class="p-2 hover:bg-gray-600 rounded" title="List">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
                <!-- Editor -->
                <textarea name="content" id="content-editor" rows="20"
                          class="w-full bg-gray-800 px-4 py-3 focus:outline-none focus:ring-0 font-mono text-sm">{{ page.content }}</textarea>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-medium">
                Save Changes
            </button>
            <a href="/wiki/page/{{ page.frontmatter.id }}" class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded-lg">
                Cancel
            </a>
        </div>
    </form>

    <!-- Preview -->
    <div class="bg-gray-800 rounded-xl p-6">
        <h3 class="text-lg font-semibold mb-4">Preview</h3>
        <div id="preview" class="wiki-content min-h-[200px]"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    const editor = document.getElementById('content-editor');
    const preview = document.getElementById('preview');

    function insertMarkdown(before, after) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const text = editor.value;
        const selected = text.substring(start, end);

        editor.value = text.substring(0, start) + before + selected + after + text.substring(end);
        editor.focus();
        editor.setSelectionRange(start + before.length, end + before.length);
        updatePreview();
    }

    function updatePreview() {
        let content = editor.value;
        content = renderWikiLinks(content);
        preview.innerHTML = marked.parse(content);
    }

    editor.addEventListener('input', updatePreview);
    updatePreview();
</script>
{% endblock %}
