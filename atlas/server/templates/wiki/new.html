{% extends "base.html" %}

{% block title %}New Page - Wiki{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex items-center gap-4">
        <a href="/wiki" class="text-gray-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold">Create New Page</h1>
    </div>

    <!-- Create Form -->
    <form action="/wiki/new" method="post" class="space-y-6">
        <!-- Page ID -->
        <div>
            <label class="block text-sm font-medium mb-2">Page ID (URL slug)</label>
            <input type="text" name="page_id" required placeholder="e.g., algo-shor, prim-qft"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-sm text-gray-400 mt-1">Lowercase letters, numbers, and hyphens only</p>
        </div>

        <!-- Title -->
        <div>
            <label class="block text-sm font-medium mb-2">Title</label>
            <input type="text" name="title" required placeholder="e.g., Shor's Algorithm"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Page Type -->
        <div>
            <label class="block text-sm font-medium mb-2">Page Type</label>
            <select name="page_type" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="concept">Concept - General knowledge (e.g., quantum gates, algorithms)</option>
                <option value="entity">Entity - Specific item (e.g., primitive, algorithm instance)</option>
                <option value="source">Source Summary - Paper/article summary</option>
                <option value="comparison">Comparison - Side-by-side analysis</option>
            </select>
        </div>

        <!-- Category -->
        <div>
            <label class="block text-sm font-medium mb-2">Category (optional)</label>
            <input type="text" name="category" placeholder="e.g., primitive, algorithm, paper"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Tags -->
        <div>
            <label class="block text-sm font-medium mb-2">Tags (comma-separated)</label>
            <input type="text" name="tags" placeholder="e.g., quantum, algorithm, factorization"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Content -->
        <div>
            <label class="block text-sm font-medium mb-2">Content (Markdown)</label>
            <textarea name="content" rows="15" placeholder="Write your page content in Markdown..."
                      class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"></textarea>
        </div>

        <!-- Actions -->
        <div class="flex gap-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-medium">
                Create Page
            </button>
            <a href="/wiki" class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded-lg">
                Cancel
            </a>
        </div>
    </form>

    <!-- Template Suggestions -->
    <div class="bg-gray-800 rounded-xl p-6">
        <h3 class="text-lg font-semibold mb-4">Page Templates</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button type="button" onclick="fillTemplate('primitive')" class="text-left p-4 bg-gray-700 rounded-lg hover:bg-gray-600">
                <h4 class="font-medium">Primitive Template</h4>
                <p class="text-sm text-gray-400 mt-1">For quantum primitives (QFT, QPE, etc.)</p>
            </button>
            <button type="button" onclick="fillTemplate('algorithm')" class="text-left p-4 bg-gray-700 rounded-lg hover:bg-gray-600">
                <h4 class="font-medium">Algorithm Template</h4>
                <p class="text-sm text-gray-400 mt-1">For quantum algorithms (Shor, Grover, etc.)</p>
            </button>
            <button type="button" onclick="fillTemplate('concept')" class="text-left p-4 bg-gray-700 rounded-lg hover:bg-gray-600">
                <h4 class="font-medium">Concept Template</h4>
                <p class="text-sm text-gray-400 mt-1">For general quantum concepts</p>
            </button>
            <button type="button" onclick="fillTemplate('comparison')" class="text-left p-4 bg-gray-700 rounded-lg hover:bg-gray-600">
                <h4 class="font-medium">Comparison Template</h4>
                <p class="text-sm text-gray-400 mt-1">For comparing algorithms/approaches</p>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    const templates = {
        primitive: `## Overview

Brief description of the primitive.

## Mathematical Definition

Mathematical formulation of the primitive.

## Circuit Implementation

\`\`\`
Circuit diagram or QASM code
\`\`\`

## Resource Requirements

- **Qubits**: N
- **Gates**: ...
- **Depth**: ...

## Applications

- [[algorithm-1]]
- [[algorithm-2]]

## References

- Source paper
`,
        algorithm: `## Overview

Brief description of the algorithm and its purpose.

## Problem Statement

What problem does this algorithm solve?

## Algorithm Description

Step-by-step explanation.

## Circuit Structure

\`\`\`
High-level circuit structure
\`\`\`

## Complexity Analysis

- **Time Complexity**: O(...)
- **Space Complexity**: O(...)
- **Gate Count**: ...

## Primitives Used

- [[prim-xxx]]
- [[prim-yyy]]

## Variants

- Variant 1
- Variant 2

## References

- Original paper
`,
        concept: `## Definition

Clear definition of the concept.

## Key Properties

- Property 1
- Property 2

## Related Concepts

- [[concept-1]]
- [[concept-2]]

## Applications

How this concept is used in practice.

## Further Reading

- Resources for learning more
`,
        comparison: `## Overview

Brief description of what is being compared.

## Comparison Table

| Feature | Algorithm A | Algorithm B |
|---------|-------------|-------------|
| Qubits  | ...         | ...         |
| Depth   | ...         | ...         |
| Speed   | ...         | ...         |

## Detailed Analysis

### Algorithm A
Pros and cons

### Algorithm B
Pros and cons

## Use Cases

When to use which algorithm.

## References

- Source papers
`
    };

    function fillTemplate(type) {
        document.querySelector('textarea[name="content"]').value = templates[type];
    }
</script>
{% endblock %}
